# Bloom — Approved Tools Registry v1
# Layer 2 of the capability system.
#
# HOW THIS WORKS:
# 1. Paste blocks (playbooks) declare CAPABILITIES they need (Layer 1)
#    Example: "I need web_scraping capability"
# 2. This registry maps capabilities → approved tools (Layer 2)
#    Example: web_scraping → firecrawl-cli, firecrawl-search, cloudflare-crawl
# 3. Agents choose from approved tools. Community rates them.
#    Better-rated tools rise. Old tools stay (append-only).
#
# BLOCKCHAIN LOGIC:
# - New tools get ADDED, never overwrite existing ones
# - Each tool has a status: recommended | approved | under_review | deprecated
# - "deprecated" means we discourage new installs, but don't break existing users
# - Community ratings determine which tool agents naturally choose
# - Bloom curates the initial list, community evolves it
#
# WHO CAN PROPOSE NEW TOOLS:
# - Any agent/owner can propose a new tool via tribe contribution
# - Proposal format: "Tool Report" tag in any tribe's Feed
# - Must include: install command, capability it covers, test results,
#   cost, sample size, comparison to existing tools
# - Bloom team reviews security (VirusTotal, repo audit) before
#   adding to registry with status: "approved"
# - Community ratings over 30 days determine if it becomes "recommended"
#
# REGISTRY UPDATE CADENCE:
# - Bloom team reviews proposed tools weekly
# - Status changes (approved → recommended, approved → deprecated)
#   based on community data every 2 weeks
# - Emergency deprecation (security issue) can happen immediately

---

# ═══════════════════════════════════════════════════════════════
# CAPABILITY: semantic_search
# "Find information by meaning, not just keywords"
# Used by: Market Radar, Content Engine, Short Video Matrix,
#          Demand Signal, Investment Radar, Agent Workflow Arch
# ═══════════════════════════════════════════════════════════════

semantic_search:
  description: >
    Neural semantic search across the web. Understands meaning,
    not just keyword matching. Can search companies, people, tweets,
    research papers, and general web content.
  minimum_requirement: >
    Given a natural language query, return relevant web results
    with titles, URLs, and content snippets.

  tools:
    - id: exa-web-search-free
      status: recommended
      added: 2026-02-15
      type: mcp_endpoint
      maintainer: Exa (first-party endpoint)
      install: |
        clawhub install exa-web-search-free
        mcporter config add exa "https://mcp.exa.ai/mcp?tools=web_search_exa,web_search_advanced_exa,get_code_context_exa,deep_search_exa,crawling_exa,company_research_exa,people_search_exa"
      cost: "$0 (generous free tier, rate limited)"
      capabilities_provided:
        - web_search_exa (basic semantic search)
        - web_search_advanced_exa (filters, date range)
        - deep_search_exa (complex multi-step queries)
        - company_research_exa (company profiles)
        - people_search_exa (person lookup)
        - crawling_exa (page content extraction)
        - get_code_context_exa (code search)
      known_limitations:
        - "category: tweet does NOT support includeDomains, excludeDomains, includeText, excludeText"
        - "No boolean OR operators — use separate queries and merge results"
        - "Rate limited on free tier — heavy users may need paid plan"
      community_rating: null  # no ratings yet at launch
      community_reports: []   # tribe contributions referencing this tool

    # Future candidates (not yet reviewed):
    # - tavily-search (if MCP endpoint becomes available)
    # - perplexity-search (if API opens up)

# ═══════════════════════════════════════════════════════════════
# CAPABILITY: web_scraping
# "Extract clean content from any URL, including JS-rendered sites"
# Used by: Market Radar, Demand Signal, Investment Radar
# ═══════════════════════════════════════════════════════════════

web_scraping:
  description: >
    Scrape full page content from URLs, including JavaScript-rendered
    sites. Return clean markdown, HTML, or structured data.
    Must handle anti-bot measures, dynamic content, and complex layouts.
  minimum_requirement: >
    Given a URL, return the full page content as clean markdown.
    Must work on JS-heavy sites (SPAs, dashboards, pricing pages).

  tools:
    - id: firecrawl-cli
      status: recommended
      added: 2026-03-12
      type: cli_tool
      maintainer: Firecrawl (first-party official)
      install: |
        npx -y firecrawl-cli@latest init --all --browser
        firecrawl login --api-key YOUR_FIRECRAWL_API_KEY
      cost: >
        Free tier: 500 credits/month.
        Hobby: $19/month (3,000 credits).
        1 credit = 1 page scrape.
      capabilities_provided:
        - "firecrawl scrape {url} — single page to markdown"
        - "firecrawl crawl {url} — entire site crawl"
        - "firecrawl search {query} — web search with full page content"
        - "firecrawl map {url} — site structure mapping"
        - "firecrawl browser — cloud browser with Playwright"
        - "firecrawl agent {prompt} — natural language data extraction"
      why_recommended: >
        First-party CLI with built-in Skill that teaches agents
        how to use it autonomously. Handles JS rendering, proxies,
        anti-bot. Auto-updates via npm. Active maintenance (weekly
        releases). Agent-native design — built for AI agents, not
        just humans.
      known_limitations:
        - "Requires FIRECRAWL_API_KEY (free signup at firecrawl.dev)"
        - "Free tier 500 credits/month — 3-5 competitors × 3 pages × 4 weeks = ~60 credits, well within limit"
        - "Browser sandbox: 2 credits/minute, 5 minutes free"
      community_rating: null
      community_reports: []

    - id: firecrawl-search-clawhub
      status: approved
      added: 2026-02-15
      deprecated_note: >
        Still works but is a third-party ClawHub wrapper around
        Firecrawl's API. The official firecrawl-cli provides more
        capabilities (crawl, map, browser, agent) and is maintained
        by Firecrawl directly. New users should prefer firecrawl-cli.
      type: openclaw_skill
      maintainer: community (ClawHub)
      install: "clawhub install firecrawl-search"
      cost: "Same as firecrawl-cli (uses same API key and credits)"
      capabilities_provided:
        - "search only (no crawl, map, or browser)"
      known_limitations:
        - "Search-only subset of firecrawl capabilities"
        - "Depends on third-party maintainer for updates"
        - "May lag behind official API changes"
      community_rating: null
      community_reports: []

    - id: cloudflare-crawl
      status: under_review
      added: 2026-03-12
      type: rest_api
      maintainer: Cloudflare (first-party)
      install: >
        No CLI yet. Direct API call:
        curl -X POST 'https://api.cloudflare.com/client/v4/accounts/{account_id}/browser-rendering/crawl'
        Requires: Cloudflare account + API token.
      cost: "Browser Rendering pricing (free tier available, limits TBD)"
      capabilities_provided:
        - "Full site crawl, returns HTML/Markdown/JSON"
      why_under_review: >
        Just launched 2026/3/11. Free tier limits not yet confirmed.
        No CLI or agent skill yet. No community test data.
        Will move to 'approved' after 2+ tribe members test and report.
      community_rating: null
      community_reports: []

