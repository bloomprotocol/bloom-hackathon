# ═══════════════════════════════════════════════════════════════
# CAPABILITY: video_generation
# "Generate short video clips from text prompts"
# Used by: Short Video Matrix
# ═══════════════════════════════════════════════════════════════

video_generation:
  description: >
    Generate short (5-60 second) video clips for social media content
    (TikTok, Reels, Shorts). Two approaches: AI-generated visuals
    (text/image to video) or UGC-style assembly (real human reaction
    clips + product demos + trending audio).
  minimum_requirement: >
    Given a text prompt or product demo footage, produce a short video
    clip ready for social media posting.

  tools:
    - id: reelclaw
      status: approved
      added: 2026-03-13
      type: openclaw_skill
      maintainer: DansUGC (first-party for the skill, UGC clips from DansUGC library)
      install: "clawhub install reelclaw"
      cost: >
        Skill: $0 (open source).
        UGC reaction clips: paid via DansUGC balance (per-clip pricing).
        Gemini API: free tier available for video analysis.
      capabilities_provided:
        - "UGC-style reel assembly (real human reaction hooks + product demos)"
        - "Gemini video intelligence auto-selects best 7-9s clips from raw footage"
        - "2,000+ real human reaction clips from 40+ creators (shocked, crying, laughing, etc.)"
        - "TikTok/IG trend research for music and format selection"
        - "ffmpeg-based automated editing and rendering"
        - "Multi-account batch publishing"
      why_notable: >
        UGC-style videos with real human reactions consistently outperform
        AI-generated visuals on TikTok and Instagram in completion rate
        and conversion. This fills a gap that pure AI video generators
        (seedance, clawvid) don't cover.
      known_limitations:
        - "Not in official openclaw/skills repo — maintained by DansUGC"
        - "Requires DansUGC account with balance for UGC clip access"
        - "Requires Gemini API key for video analysis"
        - "Requires ffmpeg installed locally"
        - "UGC clips are commercial assets — check licensing for your use case"
      community_rating: null
      community_reports: []

    - id: seedance-video-generation-byteplus
      status: approved
      added: 2026-03-01
      type: openclaw_skill
      maintainer: community (ClawHub)
      install: "clawhub install seedance-video-generation-byteplus"
      cost: "$0 (2M tokens free, then pay-per-use)"
      capabilities_provided:
        - "Text-to-video generation (5-15 second clips)"
        - "AI-generated visuals from text prompts"
      known_limitations:
        - "Quality varies — good for B-roll, not primary content"
        - "2M token free tier may run out with heavy use"
        - "Output looks AI-generated (lower completion rate vs UGC on TikTok)"
      community_rating: null
      community_reports: []

