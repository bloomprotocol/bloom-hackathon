<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="passGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
  </defs>
  <!-- Outer ticket shape -->
  <rect x="3" y="6" width="18" height="12" rx="2" fill="url(#passGradient)" opacity="0.15" />
  <rect x="3" y="6" width="18" height="12" rx="2" stroke="url(#passGradient)" stroke-width="1.5" fill="none" />
  <!-- Center circle/badge -->
  <circle cx="12" cy="12" r="2.5" fill="url(#passGradient)" />
  <circle cx="12" cy="12" r="1.5" fill="white" opacity="0.4" />
  <!-- Decorative lines -->
  <line x1="7" y1="10" x2="9" y2="10" stroke="url(#passGradient)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="15" y1="10" x2="17" y2="10" stroke="url(#passGradient)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="7" y1="14" x2="9" y2="14" stroke="url(#passGradient)" stroke-width="1.5" stroke-linecap="round" />
  <line x1="15" y1="14" x2="17" y2="14" stroke="url(#passGradient)" stroke-width="1.5" stroke-linecap="round" />
</svg>
